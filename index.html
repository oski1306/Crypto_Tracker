<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MyCrypto</title>
</head>
<body>
    <h1>MyCrypto</h1>

    <main class="container">
        <div class="empty-state" id="empty-state">
            <div class="add-card" id="addCoinBtn">
                <span>+</span>
            </div>
            <p>No coins added</p>
        </div>

        <div class="coin-list" id="coinList"></div>

        <div class="extended-panel hidden" id="extendedPanel">
            <div class="extended-content">

                <div class="extended-header">
                    <h2 id="extendedTitle">BTC</h2>

                    <div class="extended-filters">
                        <span class="ext-filter active" data-filter="1D">1D</span>
                        <span class="ext-filter" data-filter="1W">1W</span>
                        <span class="ext-filter" data-filter="1M">1M</span>
                        <span class="ext-filter" data-filter="3M">3M</span>
                        <span class="ext-filter" data-filter="1Y">1Y</span>
                    </div>
                </div>

                <div class="extended-price" id="extendedPrice"></div>

                <div class="chart-container">
                    <div id="chart" style="height: 250px;"></div>
                </div>

                <div class="extended-stats">
                    <div>
                        <p>AVG Today: <span id="avgPrice"></span></p>
                        <p>HIGH Today: <span id="highPrice"></span></p>
                        <p>LOW Today: <span id="lowPrice"></span></p>
                    </div>

                    <div>
                        <p>Your Amount: <span id="userAmount"></span></p>
                        <p>Value: <span id="userValue"></span></p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div class="modal hidden" id="modal">
        <div class="modal-content">

            <span class="close-btn" id="closeModal">x</span>

            <h2>Add coin</h2>

            <label>Coin:</label>
            <select id="coinSelectModal">
                <option value="btcusdt">Bitcoin</option>
                <option value="ethusdt">Ethereum</option>
            </select>

            <label>Amount:</label>
            <input type="number" placeholder="Enter amount"/>

            <button class="add-btn">Add</button>
        </div>
    </div>

    <div class="modal hidden" id="settingsModal">
        <div class="modal-content">

            <span class="close-btn" id="closeSettings">x</span>

            <h2>Coin settings</h2>

            <label>Currency:</label>
            <select>
                <option>USD</option>
            </select>

            <label>Amount:</label>
            <input type="number" placeholder="0.001"/>

            <div class="settings-actions">
                <button class="delete-btn">Delete</button>
                <button class="apply-btn">Apply</button>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="confirmModal">
        <div class="modal-content">

            <span class="close-btn" id="closeConfirm">x</span>

            <h2>Do you want to apply changes?</h2>

            <div class="confirm-section">
                <div>Currency:</div>
                <div>
                    <span class="old-value" id="oldCurrency"></span>
                    =>
                    <span class="new-value" id="newCurrency"></span>
                </div>
            </div>

            <div class="confirm-section">
                <div>Amount:</div>
                <div>
                    <span class="old-value" id="oldAmount"></span>
                    =>
                    <span class="new-value" id="newAmount"></span>
                </div>
            </div>

            <div class="confirm-actions">
                <button class="no-btn" id="confirmNo">NO</button>
                <button class="yes-btn" id="confirmYes">YES</button>
            </div>

        </div>
    </div>

     <div class="modal hidden" id="deleteModal">
            <div class="modal-content">

                    <span class="close-btn" id="closeDelete">x</span>

                    <h2>Do you want to delete this coin?</h2>

                <div class="confirm-section">
                        <div>Coin:</div>
                        <div id="deleteCoin"></div>
                </div>

                <div class="confirm-section">
                        <div>Amount:</div>
                        <div id="deleteAmount"></div>
                </div>

                <div class="confirm-actions">
                        <button class="no-btn" id="deleteNo">NO</button>
                        <button class="yes-btn" id="deleteYes">YES</button>
                </div>
                    
            </div>
        </div>

    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="main.js"></script>
</body>
</html>
